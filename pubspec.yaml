name: mightystore
description: A new Flutter application.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # COMMON
  nb_utils: ^7.1.4

  # BASE
  intl: ^0.19.0

  # FIREBASE PACKAGES
  firebase_crashlytics: ^4.3.6
  firebase_analytics: ^11.4.6
  firebase_remote_config: ^5.4.4

  # UI
  flutter_vector_icons: ^2.0.0
  dotted_border: ^3.0.1
  flutter_rating_bar: ^4.0.1
  otp_text_field: ^1.1.3
  flutter_staggered_grid_view: ^0.7.0
  country_code_picker: ^3.3.0
  html: ^0.15.6
  flutter_html: ^3.0.0-beta.2
  package_info_plus: ^8.3.0
  clippy_flutter: 2.0.0-nullsafety.1
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.4

  # PUSH NOTIFICATION
  onesignal_flutter: ^5.3.3

  # STATE MANAGEMENT
  mobx: ^2.5.0
  flutter_mobx: ^2.3.0

  # ADS
  google_mobile_ads: ^6.0.0


  # VIDEOS
  video_player: ^2.10.0

  # IMAGES
  image_picker: ^1.1.2
  photo_view: ^0.15.0

  # AUTHENTICATION
  google_sign_in: ^6.3.0
  the_apple_sign_in: ^1.1.1

  # CONNECTIVITY
  http: ^1.4.0
  share_plus: ^11.0.0

  #TOOLS
  google_fonts: ^6.2.1

  # WEB TOOLS
  webview_flutter: ^4.13.0

  # PAYMENTS
  flutter_stripe: ^11.5.0
  flutterwave_standard: ^1.1.0
  razorpay_flutter: ^1.4.0
  flutter_paystack:
    git:
      url: https://github.com/I-driod/flutter_paystack.git
      ref: master

  # LAUNCH URL
  url_launcher: ^6.3.1

  flutter_localizations:
    sdk: flutter

dependency_overrides:
#  nb_utils: ^6.0.4
  webview_flutter: ^4.2.4
  intl: ^0.18.0
  http: ^0.13.0
  flutter_svg: ^1.0.0
  flutter_layout_grid: 2.0.5
  file: 7.0.0
  platform: ^3.1.2
  chewie_audio: 1.5.0
  firebase_remote_config: ^5.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  mobx_codegen: ^2.6.1
  build_runner: ^2.4.11
  #flutter packages pub run build_runner build --delete-conflicting-outputs

flutter:

  uses-material-design: true

  assets:
    - images/mightystore/
    - lang/
    - assets/
    - images/mightystore/Christmas/
    - images/mightystore/Halloween/
